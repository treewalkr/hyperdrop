<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HyperDrop — Send Files</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📤</text></svg>">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    /* ========================================
       RESET & AURORA THEME
       ======================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b1a;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.14);
      --text: #e8e8f8;
      --text-muted: #7878a0;
      --accent: #7c6cf0;
      --accent-secondary: #4ecdc4;
      --accent-glow: rgba(124,108,240,0.2);
      --accent2-glow: rgba(78,205,196,0.15);
      --success: #4ecdc4;
      --danger: #ff6b6b;
      --warning: #ffd93d;
      --radius: 16px;
      --radius-sm: 12px;
      --header-h: 56px;
      --gradient-accent: linear-gradient(135deg, #7c6cf0, #4ecdc4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ========================================
       ANIMATED AURORA BACKGROUND
       ======================================== */
    .aurora-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .aurora-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      will-change: transform, opacity;
    }

    .aurora-blob.blob-1 {
      width: 600px; height: 600px;
      background: rgba(124,108,240,0.15);
      top: -10%; left: -5%;
      animation: aurora-drift-1 18s ease-in-out infinite;
    }

    .aurora-blob.blob-2 {
      width: 500px; height: 500px;
      background: rgba(78,205,196,0.10);
      top: 40%; right: -8%;
      animation: aurora-drift-2 22s ease-in-out infinite;
    }

    .aurora-blob.blob-3 {
      width: 450px; height: 450px;
      background: rgba(200,100,255,0.10);
      bottom: -5%; left: 30%;
      animation: aurora-drift-3 20s ease-in-out infinite;
    }

    .aurora-blob.blob-4 {
      width: 350px; height: 350px;
      background: rgba(124,108,240,0.08);
      top: 20%; left: 50%;
      animation: aurora-drift-4 25s ease-in-out infinite;
    }

    @keyframes aurora-drift-1 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; }
      33% { transform: translate(80px, 60px) scale(1.15); opacity: 1; }
      66% { transform: translate(-40px, 120px) scale(0.9); opacity: 0.8; }
    }

    @keyframes aurora-drift-2 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
      33% { transform: translate(-100px, -40px) scale(1.2); opacity: 0.9; }
      66% { transform: translate(50px, -80px) scale(0.95); opacity: 0.7; }
    }

    @keyframes aurora-drift-3 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
      33% { transform: translate(60px, -50px) scale(1.1); opacity: 0.85; }
      66% { transform: translate(-80px, 30px) scale(0.9); opacity: 0.6; }
    }

    @keyframes aurora-drift-4 {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
      50% { transform: translate(-70px, 90px) scale(1.25); opacity: 0.7; }
    }

    /* ========================================
       GLASS MIXIN
       ======================================== */
    .glass {
      background: var(--surface);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
    }

    /* ========================================
       HEADER
       ======================================== */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: var(--header-h);
      background: rgba(8,11,26,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }

    .app-header .brand {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }

    .header-nav {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-nav a {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.85rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid transparent;
      transition: all 0.2s ease;
    }

    .header-nav a:hover {
      color: var(--text);
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }

    .header-nav a.active {
      color: var(--accent);
      border-color: rgba(124,108,240,0.3);
      background: var(--accent-glow);
      box-shadow: 0 0 20px rgba(124,108,240,0.1);
    }

    .header-nav a svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
    }

    /* ========================================
       BODY DRAG-OVER STATE
       ======================================== */
    body.drag-active::after {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(124,108,240,0.06);
      border: 2px dashed rgba(124,108,240,0.4);
      z-index: 50;
      pointer-events: none;
      animation: aurora-pulse-border 1.5s ease infinite;
    }

    body.drag-active .aurora-blob {
      filter: blur(80px);
      opacity: 1.4;
    }

    @keyframes aurora-pulse-border {
      0%, 100% { border-color: rgba(124,108,240,0.4); }
      50% { border-color: rgba(78,205,196,0.3); }
    }

    /* ========================================
       SEND STAGE — NEBULA (CENTERED CIRCLE)
       ======================================== */
    .send-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--header-h));
      padding: 2rem;
      gap: 2.5rem;
      position: relative;
      z-index: 1;
    }

    .send-stage .intro { text-align: center; }

    .send-stage .intro h2 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .send-stage .intro p {
      color: var(--text-muted);
      margin-top: 0.5rem;
      font-size: 0.95rem;
    }

    /* Nebula dropzone — circular portal with rotating conic ring + glow */
    .nebula-dropzone {
      position: relative;
      width: 260px;
      height: 260px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .nebula-dropzone:hover { transform: scale(1.03); }
    .nebula-dropzone.dragover { transform: scale(1.06); }

    .nebula-dropzone .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px dashed rgba(124,108,240,0.3);
      animation: ring-rotate 20s linear infinite;
    }

    .nebula-dropzone .ring::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, rgba(124,108,240,0.4), transparent 30%, rgba(78,205,196,0.3) 60%, transparent 90%);
      mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 2px));
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #fff calc(100% - 2px));
      animation: ring-rotate 12s linear infinite reverse;
    }

    @keyframes ring-rotate {
      to { transform: rotate(360deg); }
    }

    .nebula-dropzone .inner {
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      transition: all 0.3s ease;
    }

    .nebula-dropzone:hover .inner,
    .nebula-dropzone.dragover .inner {
      background: rgba(124,108,240,0.08);
      border-color: rgba(124,108,240,0.2);
      box-shadow: 0 0 40px rgba(124,108,240,0.15), inset 0 0 40px rgba(124,108,240,0.05);
    }

    .nebula-dropzone .glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,108,240,0.12) 0%, transparent 70%);
      animation: glow-pulse 3s ease-in-out infinite;
      pointer-events: none;
    }

    .nebula-dropzone.dragover .glow {
      background: radial-gradient(circle, rgba(124,108,240,0.25) 0%, transparent 70%);
    }

    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    .nebula-dropzone svg {
      width: 44px; height: 44px;
      stroke: var(--text-muted);
      fill: none;
      transition: stroke 0.3s;
    }

    .nebula-dropzone:hover svg,
    .nebula-dropzone.dragover svg {
      stroke: var(--accent);
    }

    .nebula-dropzone .label { color: var(--text-muted); font-size: 0.9rem; }
    .nebula-dropzone .browse {
      background: var(--gradient-accent);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
    }

    .file-list {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .empty-hint {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 1rem 0;
      opacity: 0.6;
    }

    /* ========================================
       FILE CARD — GLASS STYLE
       ======================================== */
    .file-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      transition: all 0.25s ease;
    }

    .file-card:hover {
      background: rgba(255,255,255,0.06);
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 16px rgba(124,108,240,0.06);
    }

    .file-card.state-error {
      border-color: rgba(255,107,107,0.25);
      background: rgba(255,107,107,0.04);
    }

    .file-card .file-icon {
      width: 38px; height: 38px; min-width: 38px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      flex-shrink: 0;
      overflow: hidden;
    }

    .file-icon.doc  { background: rgba(124,108,240,0.18); color: #7c6cf0; }
    .file-icon.img  { background: rgba(78,205,196,0.18); color: #4ecdc4; }
    .file-icon.vid  { background: rgba(255,107,107,0.18); color: #ff6b6b; }
    .file-icon.zip  { background: rgba(255,217,61,0.18); color: #ffd93d; }
    .file-icon.file { background: rgba(120,120,160,0.15); color: #7878a0; }

    .file-card .file-info {
      flex: 1;
      min-width: 0;
    }

    .file-card .file-name {
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .file-card .file-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 3px;
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .file-meta .speed { color: var(--accent); font-weight: 500; }
    .file-meta .done-label { color: var(--success); font-weight: 500; }
    .file-meta .error-label { color: var(--danger); font-weight: 500; }
    .file-meta .paused-label { color: var(--warning); font-weight: 500; }

    .file-card .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 4px;
      margin-top: 6px;
      overflow: hidden;
    }

    .file-card .progress-bar .fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 0.15s ease;
      background: var(--gradient-accent);
      box-shadow: 0 0 8px rgba(124,108,240,0.3);
    }

    .fill.done {
      background: var(--success);
      box-shadow: 0 0 8px rgba(78,205,196,0.3);
    }
    .fill.error {
      background: var(--danger);
      box-shadow: 0 0 8px rgba(255,107,107,0.3);
    }
    .fill.paused {
      background: var(--warning);
      box-shadow: 0 0 8px rgba(255,217,61,0.3);
    }

    /* --- Actions --- */
    .file-card .actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      flex-wrap: nowrap;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .file-card:hover .actions {
      opacity: 1;
    }

    @media (hover: none) {
      .file-card .actions { opacity: 1 !important; }
    }

    .act-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.35rem;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .act-btn:hover {
      background: rgba(255,255,255,0.06);
      color: var(--text);
    }
    .act-btn.danger:hover {
      color: var(--danger);
      background: rgba(255,107,107,0.1);
    }
    .act-btn svg { width: 16px; height: 16px; }

    /* ========================================
       TOAST — GLASS SLIDE-IN
       ======================================== */
    .toast-container {
      position: fixed;
      top: calc(var(--header-h) + 1rem);
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      background: rgba(20,20,40,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.7rem 1rem;
      font-size: 0.85rem;
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 16px rgba(124,108,240,0.06);
      pointer-events: auto;
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.info    { border-left: 3px solid var(--accent); }

    /* ========================================
       CONFIRM MODAL — GLASS FADE
       ======================================== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8,11,26,0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
      animation: aurora-modal-in 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes aurora-modal-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .modal-box {
      background: rgba(20,20,40,0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      max-width: 380px;
      width: 90%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 24px rgba(124,108,240,0.06);
      animation: aurora-modal-box-in 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes aurora-modal-box-in {
      from { opacity: 0; transform: scale(0.92) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-box h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
    .modal-box p  { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1.25rem; line-height: 1.5; }
    .modal-box .fname { color: var(--text); font-weight: 500; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }

    .modal-actions button {
      padding: 0.5rem 1.1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      font-weight: 500;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .modal-actions button:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
    }

    .modal-actions .btn-danger {
      background: rgba(255,107,107,0.15);
      border-color: rgba(255,107,107,0.3);
      color: var(--danger);
    }

    .modal-actions .btn-danger:hover {
      background: rgba(255,107,107,0.25);
      border-color: rgba(255,107,107,0.5);
    }

    /* ========================================
       RESPONSIVE
       ======================================== */
    @media (max-width: 768px) {
      .nebula-dropzone {
        width: 200px;
        height: 200px;
      }

      .app-header { padding: 0 1rem; }
      .toast-container { right: 1rem; left: 1rem; }
      .toast { max-width: 100%; }
    }

    /* ========================================
       SCROLLBAR
       ======================================== */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.14);
    }

    [x-cloak] { display: none !important; }
  </style>
</head>
<body x-data="sendPage()" x-init="init()"
      :class="{ 'drag-active': dragging }"
      @dragenter.window.prevent="dragEnter()"
      @dragleave.window.prevent="dragLeave()"
      @dragover.window.prevent
      @drop.window.prevent="bodyDrop()"
      @keydown.escape.window="confirmCancel()">

  <!-- AURORA BACKGROUND -->
  <div class="aurora-bg" aria-hidden="true">
    <div class="aurora-blob blob-1"></div>
    <div class="aurora-blob blob-2"></div>
    <div class="aurora-blob blob-3"></div>
    <div class="aurora-blob blob-4"></div>
  </div>

  <!-- HEADER -->
  <header class="app-header">
    <a href="/" class="brand">HyperDrop</a>
    <nav class="header-nav">
      <a href="/" class="active" title="Upload files" aria-label="Send files">
        <svg stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
        Send
      </a>
      <a href="/files" title="Manage files" aria-label="Browse files">
        <svg stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
        Files
      </a>
    </nav>
  </header>

  <!-- SEND STAGE — NEBULA -->
  <main class="send-stage">
    <div class="intro">
      <h2>Send files across the void</h2>
      <p>Drop files into the portal — they'll be saved locally</p>
    </div>

    <div class="nebula-dropzone"
         role="button" tabindex="0"
         aria-label="Drop files here or click to browse"
         :class="{ dragover: dzOver }"
         @click="$refs.fileInput.click()"
         @keydown.enter.prevent="$refs.fileInput.click()"
         @keydown.space.prevent="$refs.fileInput.click()"
         @dragenter.prevent="dzOver = true"
         @dragover.prevent
         @dragleave.prevent="dzOver = false"
         @drop.prevent="dropFiles($event)">
      <div class="glow"></div>
      <div class="ring"></div>
      <div class="inner">
        <svg fill="none" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
        </svg>
        <span class="label">Drag here or <span class="browse">browse</span></span>
      </div>
    </div>

    <div class="file-list">
      <template x-if="files.length === 0">
        <div class="empty-hint">Files you drop will appear here</div>
      </template>

      <template x-for="f in files" :key="f.id">
        <div class="file-card" :class="{ 'state-error': f.status === 'error' }">
          <div class="file-icon" :class="f.category" x-text="f.ext || '?'"></div>
          <div class="file-info">
            <div class="file-name" :title="f.name" x-text="f.name"></div>
            <div class="file-meta">
              <span x-text="formatSize(f.size)"></span>
              <template x-if="f.status === 'uploading'">
                <span>· <span class="speed" x-text="f.speed + ' MB/s'"></span> · <span x-text="Math.round(100 - f.progress) + '% left'"></span></span>
              </template>
              <template x-if="f.status === 'paused'">
                <span>· <span class="paused-label" x-text="'Paused at ' + Math.round(f.progress) + '%'"></span></span>
              </template>
              <template x-if="f.status === 'error'">
                <span>· <span class="error-label">Failed — tap retry</span></span>
              </template>
              <template x-if="f.status === 'done'">
                <span>· <span class="done-label">Complete</span></span>
              </template>
            </div>
            <div class="progress-bar">
              <div class="fill"
                   :class="f.status === 'done' ? 'done' : f.status === 'error' ? 'error' : f.status === 'paused' ? 'paused' : ''"
                   :style="'width:' + f.progress + '%'"></div>
            </div>
          </div>
          <div class="actions">
            <!-- uploading: pause / cancel -->
            <template x-if="f.status === 'uploading'">
              <span>
                <button class="act-btn" @click.stop="pauseUpload(f.id)" title="Pause" aria-label="Pause upload">
                  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                </button>
                <button class="act-btn danger" @click.stop="cancelUpload(f.id)" title="Cancel" aria-label="Cancel upload">
                  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              </span>
            </template>
            <!-- paused: resume / cancel -->
            <template x-if="f.status === 'paused'">
              <span>
                <button class="act-btn" @click.stop="resumeUpload(f.id)" title="Resume" aria-label="Resume upload">
                  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"/></svg>
                </button>
                <button class="act-btn danger" @click.stop="cancelUpload(f.id)" title="Cancel" aria-label="Cancel upload">
                  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              </span>
            </template>
            <!-- error: retry / dismiss -->
            <template x-if="f.status === 'error'">
              <span>
                <button class="act-btn" @click.stop="retryUpload(f.id)" title="Retry" aria-label="Retry upload">
                  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182"/></svg>
                </button>
                <button class="act-btn danger" @click.stop="dismissFile(f.id)" title="Dismiss" aria-label="Remove">
                  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              </span>
            </template>
            <!-- done: download / copy link / delete -->
            <template x-if="f.status === 'done'">
              <span>
                <button class="act-btn" @click.stop="downloadFile(f.id)" title="Download" aria-label="Download file">
                  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12M12 16.5V3"/></svg>
                </button>
                <button class="act-btn" @click.stop="copyLink(f.id)" title="Copy link" aria-label="Copy link">
                  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m9.86-2.54a4.5 4.5 0 00-1.242-7.244l-4.5-4.5a4.5 4.5 0 00-6.364 6.364L4.757 8.96"/></svg>
                </button>
                <button class="act-btn danger" @click.stop="removeFile(f.id)" title="Delete" aria-label="Delete file">
                  <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              </span>
            </template>
          </div>
        </div>
      </template>
    </div>
  </main>

  <!-- CONFIRM MODAL -->
  <div class="modal-overlay" :class="{ open: confirmOpen }" role="dialog" aria-modal="true" @click.self="confirmCancel()">
    <div class="modal-box">
      <h3 x-text="confirmTitle"></h3>
      <p x-html="confirmBody"></p>
      <div class="modal-actions">
        <button @click="confirmCancel()">Cancel</button>
        <button class="btn-danger" @click="confirmOk()" x-text="confirmOkLabel"></button>
      </div>
    </div>
  </div>

  <!-- TOASTS -->
  <div class="toast-container" aria-live="polite">
    <template x-for="t in toasts" :key="t.id">
      <div class="toast" :class="t.type" x-text="t.msg"></div>
    </template>
  </div>

  <!-- Hidden file input -->
  <input type="file" multiple x-ref="fileInput" style="display:none" @change="onFilePick($event)" aria-hidden="true">

  <script>
    function sendPage() {
      const DOC_EXTS = ['pdf','doc','docx','txt','md','xls','xlsx','csv','ppt','pptx','rtf','fig'];
      const IMG_EXTS = ['png','jpg','jpeg','gif','svg','webp','bmp','ico'];
      const VID_EXTS = ['mp4','mov','avi','mkv','webm','flv','wmv'];
      const ZIP_EXTS = ['zip','rar','7z','tar','gz','bz2','xz'];

      return {
        files: [],
        nextId: 0,
        dragging: false,
        dragCount: 0,
        dzOver: false,
        toasts: [],
        nextToastId: 0,
        confirmOpen: false,
        confirmTitle: '',
        confirmBody: '',
        confirmOkLabel: 'Remove',
        _confirmResolve: null,

        init() {
          // Hook for future boot steps (e.g. load existing files). None needed yet.
        },

        extOf(name) {
          const parts = String(name).split('.');
          return parts.length > 1 ? parts.pop().toLowerCase() : '';
        },

        categoryOf(ext) {
          if (DOC_EXTS.includes(ext)) return 'doc';
          if (IMG_EXTS.includes(ext)) return 'img';
          if (VID_EXTS.includes(ext)) return 'vid';
          if (ZIP_EXTS.includes(ext)) return 'zip';
          return 'file';
        },

        formatSize(bytes) {
          if (bytes < 1024) return bytes + ' B';
          if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
          if (bytes < 1073741824) return (bytes / 1048576).toFixed(1) + ' MB';
          return (bytes / 1073741824).toFixed(2) + ' GB';
        },

        // ---- intake ----
        addFiles(list) {
          for (const file of list) {
            const ext = this.extOf(file.name);
            const entry = {
              id: ++this.nextId,
              file,
              name: file.name,
              size: file.size,
              ext,
              category: this.categoryOf(ext),
              progress: 0,
              status: 'uploading',
              speed: 0,
              xhr: null,
            };
            this.files.push(entry);
            this.upload(entry);
          }
          const n = list.length;
          this.toast(n + ' file' + (n > 1 ? 's' : '') + ' added', 'info');
        },

        onFilePick(e) {
          if (e.target.files && e.target.files.length) this.addFiles(e.target.files);
          e.target.value = '';
        },

        // ---- upload (real backend, XHR for progress + cancel) ----
        upload(entry) {
          const fd = new FormData();
          fd.append('file', entry.file, entry.file.name);

          const xhr = new XMLHttpRequest();
          entry.xhr = xhr;
          const startedAt = Date.now();

          xhr.upload.onprogress = (e) => {
            if (!e.lengthComputable) return;
            entry.progress = Math.round((e.loaded / e.total) * 100);
            const elapsed = (Date.now() - startedAt) / 1000;
            entry.speed = elapsed > 0 ? (e.loaded / 1048576 / elapsed).toFixed(1) : '0.0';
          };
          xhr.onload = () => {
            entry.xhr = null;
            if (xhr.status >= 200 && xhr.status < 300) {
              entry.progress = 100;
              entry.status = 'done';
              entry.speed = 0;
              this.toast(entry.name + ' uploaded', 'success');
            } else {
              entry.status = 'error';
              this.toast(entry.name + ' failed (' + xhr.status + ')', 'error');
            }
          };
          xhr.onerror = () => {
            entry.xhr = null;
            entry.status = 'error';
            this.toast(entry.name + ' failed', 'error');
          };
          xhr.onabort = () => { entry.xhr = null; };

          // location.search carries ?token= on first load; the auth cookie covers later calls.
          xhr.open('POST', '/api/upload' + location.search);
          xhr.send(fd);
        },

        pauseUpload(id) {
          const f = this.files.find((x) => x.id === id);
          if (!f || f.status !== 'uploading') return;
          if (f.xhr) { f.xhr.abort(); f.xhr = null; }
          f.status = 'paused';
          this.toast(f.name + ' paused', 'info');
        },

        resumeUpload(id) {
          const f = this.files.find((x) => x.id === id);
          if (!f || (f.status !== 'paused' && f.status !== 'error')) return;
          // Single-shot multipart upload has no native resume — restart from 0%.
          f.status = 'uploading';
          f.progress = 0;
          f.speed = 0;
          this.upload(f);
          this.toast(f.name + ' resumed', 'info');
        },

        retryUpload(id) { this.resumeUpload(id); },

        async cancelUpload(id) {
          const f = this.files.find((x) => x.id === id);
          if (!f) return;
          const ok = await this.confirm(
            'Cancel upload?',
            'Cancel upload of <span class="fname">' + this.escape(f.name) + '</span>?'
          );
          if (!ok) return;
          if (f.xhr) { f.xhr.abort(); f.xhr = null; }
          this.files = this.files.filter((x) => x.id !== id);
          this.toast(f.name + ' cancelled', 'info');
        },

        dismissFile(id) {
          this.files = this.files.filter((x) => x.id !== id);
        },

        async removeFile(id) {
          const f = this.files.find((x) => x.id === id);
          if (!f) return;
          const ok = await this.confirm(
            'Delete file?',
            'Delete <span class="fname">' + this.escape(f.name) + '</span> from the server? This cannot be undone.',
            'Delete'
          );
          if (!ok) return;
          if (f.xhr) { f.xhr.abort(); f.xhr = null; }
          try {
            const resp = await fetch('/api/files/' + encodeURIComponent(f.name) + location.search, { method: 'DELETE' });
            if (resp.ok) {
              this.files = this.files.filter((x) => x.id !== id);
              this.toast(f.name + ' deleted', 'success');
            } else {
              this.toast('delete failed (' + resp.status + ')', 'error');
            }
          } catch (err) {
            this.toast('delete failed', 'error');
          }
        },

        downloadFile(id) {
          const f = this.files.find((x) => x.id === id);
          if (!f) return;
          window.open('/api/files/' + encodeURIComponent(f.name) + location.search, '_blank');
        },

        copyLink(id) {
          const f = this.files.find((x) => x.id === id);
          if (!f) return;
          const link = location.origin + '/api/files/' + encodeURIComponent(f.name) + location.search;
          if (navigator.clipboard) navigator.clipboard.writeText(link);
          this.toast('Link copied', 'success');
        },

        // ---- drag & drop ----
        dragEnter() { this.dragCount++; this.dragging = true; },
        dragLeave() { this.dragCount--; if (this.dragCount <= 0) { this.dragCount = 0; this.dragging = false; } },
        bodyDrop() { this.dragCount = 0; this.dragging = false; this.dzOver = false; },
        dropFiles(e) {
          this.dzOver = false;
          if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) {
            this.addFiles(e.dataTransfer.files);
          }
        },

        // ---- toast ----
        toast(msg, type) {
          const id = ++this.nextToastId;
          this.toasts.push({ id, msg, type: type || 'info' });
          setTimeout(() => {
            this.toasts = this.toasts.filter((t) => t.id !== id);
          }, 2500);
        },

        // ---- confirm modal ----
        confirm(title, body, okLabel) {
          return new Promise((resolve) => {
            this.confirmTitle = title;
            this.confirmBody = body;
            this.confirmOkLabel = okLabel || 'Remove';
            this.confirmOpen = true;
            this._confirmResolve = resolve;
          });
        },
        confirmOk() {
          this.confirmOpen = false;
          if (this._confirmResolve) { this._confirmResolve(true); this._confirmResolve = null; }
        },
        confirmCancel() {
          this.confirmOpen = false;
          if (this._confirmResolve) { this._confirmResolve(false); this._confirmResolve = null; }
        },

        // ---- helpers ----
        escape(s) {
          return String(s).replace(/[&<>"']/g, (c) => (
            { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
          ));
        },
      };
    }
  </script>
</body>
</html>
